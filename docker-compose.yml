version: "3.9"

services:
  backend:
    build: ./backend
    container_name: my-story-backend
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: my-story-frontend
    ports:
      - "8081:8081"
    depends_on:
      - backend
    environment:
      - EXPO_PUBLIC_API_URL=http://localhost:8080
    restart: unless-stopped
