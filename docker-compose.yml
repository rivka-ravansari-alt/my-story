version: "3.9"

services:
  backend:
    build: ./backend
    container_name: my-story-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: my-story-frontend
    ports:
      - "8081:8081"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:5000
    restart: unless-stopped
